baseURL = 'https://qingkongzhiqian.github.io/my-blog/'
languageCode = 'en'
title = 'yangning'
theme = 'PaperMod'

[pagination]
  pagerSize = 10

[params]
  env = "production"
  description = "Software Engineer · Writing about code, systems, and ideas."
  author = "yangning"
  DateFormat = "Jan 2, 2006"
  defaultTheme = "light"
  disableThemeToggle = false
  showReadingTime = true
  showShareButtons = false
  showPostNavLinks = true
  showBreadCrumbs = false
  showCodeCopyButtons = true
  disableSpecial1stPost = false
  hidemeta = false
  ShowToc = true
  TocOpen = false
  ShowWordCount = false
  comments = false

  [params.profileMode]
    enabled = false

  [[params.socialIcons]]
    name = "email"
    url = "mailto:yangning9371@gmail.com"
  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/qingkongzhiqian"
  [[params.socialIcons]]
    name = "twitter"
    url = "https://twitter.com/yangning9371"

  [params.cover]
    linkFullImages = true
    responsiveImages = true
    hidden = false
    hiddenInList = false
    hiddenInSingle = false

  [params.editPost]
    disabled = true

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    keys = ["title", "permalink", "summary", "content"]

[menu]
[[menu.main]]
  name = "Blog"
  url = "/"
  weight = 1
[[menu.main]]
  name = "About me"
  pageRef = "about"
  weight = 2
[[menu.main]]
  name = "GitHub"
  url = "https://github.com/qingkongzhiqian"
  weight = 3
[[menu.main]]
  name = "Email"
  url = "mailto:yangning9371@gmail.com"
  weight = 4
[[menu.main]]
  name = "X"
  url = "https://twitter.com/yangning9371"
  weight = 5

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.highlight]
    style = "tango"
    lineNos = false
    noClasses = true
    guessSyntax = true
  [markup.goldmark.renderer]
    unsafe = true
