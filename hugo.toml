baseURL = 'https://qingkongzhiqian.github.io/my-blog/'
languageCode = 'en'
title = 'Qingkong'
theme = 'PaperMod'

[pagination]
  pagerSize = 10

[params]
  env = "production"
  description = "Software Engineer · Writing about code, systems, and ideas."
  author = "Qingkong"
  DateFormat = "Jan 2, 2006"
  defaultTheme = "dark"
  disableThemeToggle = false
  showReadingTime = true
  showShareButtons = false
  showPostNavLinks = true
  showBreadCrumbs = false
  showCodeCopyButtons = true
  disableSpecial1stPost = false
  hidemeta = false
  ShowToc = true
  TocOpen = false
  ShowWordCount = false
  comments = false

  [params.profileMode]
    enabled = true
    title = "Qingkong"
    subtitle = "Software Engineer · Writing about code, systems, and ideas."
    imageUrl = ""
    imageWidth = 140
    imageHeight = 140

    [[params.profileMode.buttons]]
      name = "Blog"
      url = "/posts/"
    [[params.profileMode.buttons]]
      name = "Projects"
      url = "/tags/"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/qingkongzhiqian"
  [[params.socialIcons]]
    name = "rss"
    url = "/index.xml"

  [params.cover]
    linkFullImages = true
    responsiveImages = true
    hidden = false
    hiddenInList = false
    hiddenInSingle = false

  [params.editPost]
    disabled = true

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    keys = ["title", "permalink", "summary", "content"]

[menu]
[[menu.main]]
  name = "Home"
  url = "/"
  weight = 1
[[menu.main]]
  name = "Blog"
  url = "/posts/"
  weight = 5
[[menu.main]]
  name = "Archive"
  url = "/archives/"
  weight = 10
[[menu.main]]
  name = "Tags"
  url = "/tags/"
  weight = 15
[[menu.main]]
  name = "Search"
  url = "/search/"
  weight = 20

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.highlight]
    style = "monokai"
    lineNos = false
    noClasses = true
    guessSyntax = true
  [markup.goldmark.renderer]
    unsafe = true
